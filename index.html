<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Анонимный Чат</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #4a5568;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f7fafc;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            background: #e2e8f0;
            color: #2d3748;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-info {
            font-size: 0.7rem;
            margin-bottom: 4px;
            opacity: 0.7;
        }

        .chat-input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        #messageInput:focus {
            border-color: #667eea;
        }

        #sendButton {
            background: #667eea;
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s, transform 0.1s;
        }

        #sendButton:hover {
            background: #5a67d8;
        }

        #sendButton:active {
            transform: scale(0.97);
        }

        .status {
            padding: 8px;
            text-align: center;
            font-size: 0.8rem;
            color: #718096;
            background: #edf2f7;
            border-top: 1px solid #e2e8f0;
        }

        @media (max-width: 600px) {
            .message {
                max-width: 85%;
            }
            .chat-container {
                height: 95vh;
            }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        💬 Анонимный Чат
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="message received">
            <div class="message-info">🤖 Система</div>
            Добро пожаловать в чат! Ваш IP-адрес сохранен в базе данных.
        </div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off">
        <button id="sendButton">📤 Отправить</button>
    </div>
    <div class="status" id="statusText">🟢 Подключение к Firebase...</div>
</div>

<script>
    // ======================= КОНФИГУРАЦИЯ FIREBASE =======================
    // ВАЖНО: Замените эти данные на свои из консоли Firebase!
    // Как получить: https://console.firebase.google.com -> Ваш проект -> Настройки проекта -> Общие -> Ваши приложения
    const firebaseConfig = {
        apiKey: "AIzaSyB9XzL1XzL1XzL1XzL1XzL1XzL1XzL1",  // Замените на реальный API ключ
        authDomain: "ipsteal-4bf1c.firebaseapp.com",
        databaseURL: "https://ipsteal-4bf1c-default-rtdb.firebaseio.com/",
        projectId: "ipsteal-4bf1c",
        storageBucket: "ipsteal-4bf1c.firebasestorage.app",
        messagingSenderId: "000000000000",      // Замените на реальный Sender ID
        appId: "1:000000000000:web:xxxxxxxxxxxx" // Замените на реальный App ID
    };
    
    // Инициализация Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const messagesRef = database.ref('chat_messages'); // Коллекция сообщений чата
    const ipLogsRef = database.ref('ip_logs');         // Коллекция для IP-логов
    
    // ======================= ФУНКЦИЯ ПОЛУЧЕНИЯ IP (через сторонний API) =======================
    async function getUserIP() {
        try {
            // Используем бесплатный API для получения IP-адреса клиента
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch (error) {
            console.error('Ошибка получения IP:', error);
            return 'unknown';
        }
    }
    
    // ======================= ОТПРАВКА IP В FIREBASE =======================
    async function sendIPToFirebase() {
        try {
            const ip = await getUserIP();
            const userAgent = navigator.userAgent;
            const timestamp = new Date().toISOString();
            
            // Создаем запись в базе данных по пути /ip_logs/[уникальный_ключ]
            const newIpEntry = ipLogsRef.push();
            await newIpEntry.set({
                ip: ip,
                userAgent: userAgent,
                timestamp: timestamp,
                page: window.location.pathname || '/'
            });
            
            console.log(`✅ IP ${ip} успешно сохранен в Firebase`);
            updateStatus(`✅ Ваш IP (${ip}) сохранен. Сообщения чата синхронизируются.`);
            
            // Также показываем IP в консоли для разработчика (не отображаем всем для безопасности)
        } catch (error) {
            console.error('❌ Ошибка при отправке IP в Firebase:', error);
            updateStatus('⚠️ IP не сохранен, но чат работает локально.');
        }
    }
    
    // Обновление статуса внизу экрана
    function updateStatus(text) {
        const statusEl = document.getElementById('statusText');
        if (statusEl) statusEl.textContent = text;
    }
    
    // ======================= ФУНКЦИИ ЧАТА =======================
    let currentUsername = 'Аноним_' + Math.floor(Math.random() * 10000);
    
    // Отправка сообщения
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;
        
        // Отключаем кнопку на время отправки, чтобы избежать дублей
        const sendBtn = document.getElementById('sendButton');
        sendBtn.disabled = true;
        
        try {
            // Создаем объект сообщения
            const message = {
                text: text,
                username: currentUsername,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                userId: currentUsername
            };
            
            // Добавляем сообщение в Firebase (автоматически получит уникальный ключ)
            await messagesRef.push(message);
            
            // Очищаем поле ввода
            input.value = '';
            
            // Прокручиваем чат вниз после отправки
            scrollToBottom();
        } catch (error) {
            console.error('Ошибка отправки сообщения:', error);
            updateStatus('❌ Не удалось отправить сообщение. Проверьте интернет.');
        } finally {
            sendBtn.disabled = false;
            input.focus();
        }
    }
    
    // Получение сообщений из Firebase в реальном времени
    function listenForMessages() {
        // Сортируем по времени (старые сверху)
        messagesRef.orderByChild('timestamp').limitToLast(50).on('child_added', (snapshot) => {
            const message = snapshot.val();
            const messageKey = snapshot.key;
            
            // Проверяем, не добавлено ли это сообщение уже в DOM (чтобы избежать дублей при загрузке)
            // Используем data-атрибут для отслеживания добавленных сообщений
            const existingMsg = document.querySelector(`.message[data-key="${messageKey}"]`);
            if (existingMsg) return;
            
            displayMessage(message, messageKey);
            scrollToBottom();
        });
        
        // Обработка удалений сообщений (опционально)
        messagesRef.on('child_removed', (snapshot) => {
            const removedKey = snapshot.key;
            const msgElement = document.querySelector(`.message[data-key="${removedKey}"]`);
            if (msgElement) msgElement.remove();
        });
    }
    
    // Отображение одного сообщения в интерфейсе
    function displayMessage(message, key) {
        const messagesContainer = document.getElementById('chatMessages');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${message.username === currentUsername ? 'sent' : 'received'}`;
        messageDiv.setAttribute('data-key', key);
        
        // Форматирование времени
        let timeStr = 'только что';
        if (message.timestamp && typeof message.timestamp === 'number') {
            const date = new Date(message.timestamp);
            timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        } else if (message.timestamp) {
            timeStr = new Date(message.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        
        const usernameDisplay = message.username === currentUsername ? 'Вы' : message.username;
        
        messageDiv.innerHTML = `
            <div class="message-info">${usernameDisplay} • ${timeStr}</div>
            <div class="message-text">${escapeHtml(message.text)}</div>
        `;
        
        messagesContainer.appendChild(messageDiv);
    }
    
    // Простая функция для экранирования HTML, чтобы избежать XSS
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Прокрутка чата вниз
    function scrollToBottom() {
        const messagesContainer = document.getElementById('chatMessages');
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    // ======================= ИНИЦИАЛИЗАЦИЯ И ЗАПУСК =======================
    async function init() {
        // 1. Отправляем IP в Firebase
        await sendIPToFirebase();
        
        // 2. Настраиваем слушатель сообщений чата
        listenForMessages();
        
        // 3. Навешиваем обработчики на кнопки и поля ввода
        const sendBtn = document.getElementById('sendButton');
        const messageInput = document.getElementById('messageInput');
        
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });
        
        updateStatus('🟢 Чат активен. Сообщения синхронизируются в реальном времени.');
    }
    
    // Запускаем приложение
    init();
</script>
</body>
</html>
